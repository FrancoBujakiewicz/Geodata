<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

   <main>
   <div id="contenedorPrincipal">

    <div id="busqueda">
     <p>Busqueda por DNI</p>  
     <div id="contenedorBusqueda"> 
    <input type="text" placeholder="Ingresar número de DNI" class="campo"></input>
    <button id="botonBuscar">Buscar</button>
    </div>
    </div>

     <div id="mensajes"></div>

     <button id="botonNuevoRegistro" onclick="Acciones.navegacionToggle()">Nuevo registro</button>

     <div id="contenedorBotones">
        <button id="botonCerrarSesion">Cerrar sesión</button>
        <button id="botonInstalar">Instalar Geodata</button>
     </div>

     <div id="botonVolver" class="invisible"> 
      <button id="datosCiudadanoVolver" onclick="Acciones.navegacionToggle()">Volver</button>
     </div>

     <div id="botonesEdicion" class="invisible">
      <button id="edicionVolver" onclick="Acciones.navegacionEdicion()">Volver</button>
      <button id="botonEliminar">Eliminar</button> 
     </div> 

     <div id="datosCiudadano" class="invisible">
     
    <div id="dni">
     <p>DNI</p>  
    <input type="text" class="campo"></input>
    </div>

    <div id="apellido">
     <p>Apellido</p>  
    <input type="text" class="campo"></input>
    </div>
     
    <div id="nombres">
     <p>Nombres</p>  
    <input type="text" class="campo"></input>
    </div>

    <div id="numWhatsapp">
     <p>Número Whatsapp</p>  
    <input type="text" class="campo"></input>
    </div>

    <div id="direccion">
     <p>Dirección</p>  
    <input type="text" class="campo"></input>
    </div>

    <div id="observacion">
     <p>Observación</p>  
    <input type="text" class="campo"></input>
    </div>

     <div>
      <p>Ubicación</p>
      <center><div id="mapa"></div></center>
      <center><p id="textoUbicacion">Presione "Capturar ubicación"</p></center>
    </div>

    <div id="botonesMapa">

     <center><button id="botonCapturarUbicacion" onclick="Mapa.capturarUbicacion()">Capturar ubicación</button></center>

     <button id="ubicacionCorrecta" class="invisible" onclick="Acciones.confirmarUbicacion()">Confirmar ubicación</button>
     <button id="ubicacionIncorrecta" class="invisible" onclick="Mapa.reintentar()">Intentar de nuevo</button>
    </div>
    
    <div id="seccionEnvio">
      <button></button>
      <p id="mensajeFormulario"></p>
    </div>

    </div>

   </div>
   </main>

   <script type="module" src="./Geodata.ts"></script>

</body>
</html>
