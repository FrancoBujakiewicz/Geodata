<body>

   <main>
   <div id="contenedorPrincipal">

    <div id="busqueda">
     <p>Busqueda por DNI</p>  
     <div id="contenedorBusqueda"> 
    <input type="text" placeholder="Ingresar número de DNI" class="campo"></input>
    <button id="botonBuscar">Buscar</button>
    </div>
    </div>

     <div id="mensajes">placeholder</div>

     <button id="botonNuevoRegistro" onclick="Acciones.navegacionToggle()">Nuevo registro</button>

     <div id="contenedorBotones">
        <button id="botonCerrarSesion">Cerrar sesión</button>
        <button id="botonInstalar">Instalar Geodata</button>
     </div>

     <div id="botonVolver" class="invisible"> 
      <button id="datosCiudadanoVolver" onclick="Acciones.navegacionToggle()">Volver</button>
     </div>

     <div id="botonesEdicion" class="invisible">
      <center>
      <button id="edicionVolver">Volver</button>
      <button id="botonEditar">Editar</button>
      </center>
      <button id="botonEliminar">Eliminar</button> 
     </div> 

     <div id="datosCiudadano" class="invisible">
     
    <div>
     <p>DNI</p>  
    <input type="text" placeholder="Ingresar número de DNI" class="campo"></input>
    </div>

    <div>
     <p>Apellido</p>  
    <input type="text" placeholder="Ingresar apellido" class="campo"></input>
    </div>
     
    <div>
     <p>Nombres</p>  
    <input type="text" placeholder="Ingresar nombres" class="campo"></input>
    </div>

    <div>
     <p>Número Whatsapp</p>  
    <input type="text" placeholder="Ingresar número de Whatsapp" class="campo"></input>
    </div>

    <div>
     <p>Dirección</p>  
    <input type="text" placeholder="Ingresar dirección" class="campo"></input>
    </div>

    <div>
     <p>Observación</p>  
    <input type="text" placeholder="Ingresar observación (Opcional)" class="campo"></input>
    </div>

    <div>
      <p>Ubicación</p>
      <div id="mapa">
      <center><p>¿La ubicación es correcta?</p></center>
      </div>
    </div>

    <div id="botonesMapa">

     <center><button id="botonCapturarUbicacion">Capturar ubicación</button></center>

     <button id="ubicacionCorrecta" class="invisible">Confirmar ubicación</button>
     <button id="ubicacionIncorrecta" class="invisible">Intentar de nuevo</button>
    </div>
    
    <div id="seccionEnvio">
      <button>Enviar</button>
      <p>placeholder</p>
    </div>

    </div>

   </div>
   </main>


</body>
</html>
